<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsor — Ekipa Zimnego Lecha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #FF6B00;
      --orange2: #FF8C00;
      --black:   #0D0D0D;
      --dark:    #111111;
      --dark2:   #1A1A1A;
      --dark3:   #222222;
      --gray:    #888888;
      --light:   #F5F5F5;
      --white:   #FFFFFF;
      --font-h:  'Oswald', sans-serif;
      --font-b:  'Inter', sans-serif;
      --tr:      .35s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font-b); background: var(--black); color: var(--white); overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ─── NAV ───────────────────────────────────────────────────────── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(13,13,13,.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 30px rgba(0,0,0,.5);
    }

    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px; padding: 0 24px;
    }

    .nav-logo { display: flex; align-items: center; gap: 12px; }

    .nav-logo-icon {
      width: 44px; height: 44px;
      background: var(--orange);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .nav-logo-text {
      font-family: var(--font-h); font-size: 18px; font-weight: 700;
      letter-spacing: 1px; line-height: 1.2; text-transform: uppercase;
    }
    .nav-logo-text span { color: var(--orange); display: block; font-size: 11px; letter-spacing: 3px; font-weight: 400; }

    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a {
      font-family: var(--font-h); font-size: 13px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--light);
      position: relative; transition: color var(--tr);
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--orange);
      transform: scaleX(0); transition: transform var(--tr);
    }
    .nav-links a:hover { color: var(--orange); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .nav-back {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-h); font-size: 13px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--orange);
      transition: gap var(--tr);
    }
    .nav-back:hover { gap: 12px; }
    .nav-back .arrow { font-size: 18px; }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .hamburger span { display: block; width: 26px; height: 2px; background: var(--white); transition: var(--tr); }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none; flex-direction: column;
      background: var(--dark2); padding: 24px; gap: 16px;
      border-top: 2px solid var(--orange);
    }
    .mobile-menu a {
      font-family: var(--font-h); font-size: 16px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--light);
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.07);
      transition: color var(--tr);
    }
    .mobile-menu a:hover { color: var(--orange); }
    .mobile-menu.open { display: flex; }

    /* ─── HERO SPONSORA ─────────────────────────────────────────────── */
    .sponsor-hero {
      padding: 130px 0 80px;
      background: var(--dark2);
      position: relative;
      overflow: hidden;
    }

    .sponsor-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 80% 50%, rgba(255,107,0,.1) 0%, transparent 65%);
    }

    .hero-shape {
      position: absolute; right: -80px; top: -80px;
      width: 420px; height: 420px;
      background: var(--orange); opacity: .05;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      animation: rot 30s linear infinite;
    }

    @keyframes rot { to { transform: rotate(360deg); } }

    .sponsor-hero-inner {
      position: relative; z-index: 2;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 60px;
      align-items: center;
    }

    /* Logo box */
    .sponsor-logo-box {
      width: 260px; height: 180px;
      background: var(--dark3);
      border: 2px solid rgba(255,107,0,.3);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      position: relative;
      flex-shrink: 0;
    }

    .sponsor-logo-box img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }

    .sponsor-logo-placeholder {
      font-family: var(--font-h);
      font-size: 14px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gray);
      text-align: center;
    }

    .sponsor-logo-placeholder .logo-icon { font-size: 40px; display: block; margin-bottom: 10px; }

    .sponsor-tier {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-h); font-size: 10px; letter-spacing: 2.5px;
      text-transform: uppercase; padding: 4px 14px;
      background: var(--orange);
      white-space: nowrap;
      clip-path: polygon(6px 0%, calc(100% - 6px) 0%, 100% 100%, 0% 100%);
    }

    /* Hero info */
    .sponsor-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-h); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gray);
      margin-bottom: 16px;
    }
    .sponsor-breadcrumb span { color: var(--orange); }

    .sponsor-name {
      font-family: var(--font-h);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700; text-transform: uppercase;
      line-height: 1.05; margin-bottom: 10px;
    }
    .sponsor-name em { color: var(--orange); font-style: normal; }

    .sponsor-tagline {
      font-size: 16px; color: rgba(255,255,255,.65);
      line-height: 1.5; margin-bottom: 28px;
      max-width: 560px;
    }

    .sponsor-badges { display: flex; gap: 10px; flex-wrap: wrap; }

    .badge {
      font-family: var(--font-h); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 2px; color: var(--gray);
    }
    .badge.orange { border-color: var(--orange); color: var(--orange); }

    /* ─── MAIN CONTENT ──────────────────────────────────────────────── */
    .sponsor-content {
      padding: 80px 0 100px;
      background: var(--black);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 60px;
      align-items: start;
    }

    /* Opis */
    .section-label {
      display: inline-block;
      font-family: var(--font-h); font-size: 12px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--orange); margin-bottom: 12px;
    }

    .content-title {
      font-family: var(--font-h); font-size: 1.8rem; font-weight: 700;
      text-transform: uppercase; margin-bottom: 24px;
    }
    .content-title span { color: var(--orange); }

    .content-desc {
      font-size: 15px; line-height: 1.8;
      color: rgba(255,255,255,.7);
      margin-bottom: 32px;
    }

    .content-desc p + p { margin-top: 16px; }

    /* Osiągnięcia / współpraca */
    .perks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 40px;
    }

    .perk-item {
      background: var(--dark2);
      border-radius: 4px;
      padding: 20px;
      border-left: 3px solid var(--orange);
    }

    .perk-icon { font-size: 24px; margin-bottom: 8px; }

    .perk-title {
      font-family: var(--font-h); font-size: 14px; font-weight: 600;
      text-transform: uppercase; margin-bottom: 6px;
    }

    .perk-desc { font-size: 13px; color: rgba(255,255,255,.55); line-height: 1.5; }

    /* Sidebar — kontakt */
    .contact-card {
      background: var(--dark2);
      border-radius: 4px;
      border-top: 3px solid var(--orange);
      padding: 36px 32px;
      position: sticky;
      top: 96px;
    }

    .contact-card-title {
      font-family: var(--font-h); font-size: 1.2rem; font-weight: 700;
      text-transform: uppercase; margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .contact-item {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 20px;
    }

    .contact-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: var(--dark3);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .contact-item-label {
      font-family: var(--font-h); font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gray); margin-bottom: 3px;
    }

    .contact-item-value {
      font-size: 14px; color: var(--white);
      word-break: break-all;
    }

    .contact-item-value a {
      color: var(--orange);
      transition: color var(--tr);
    }
    .contact-item-value a:hover { color: var(--orange2); }

    /* Social media */
    .social-title {
      font-family: var(--font-h); font-size: 11px; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--gray);
      margin: 28px 0 14px;
    }

    .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .social-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 3px;
      padding: 12px 14px;
      font-family: var(--font-h); font-size: 12px; letter-spacing: 1px;
      text-transform: uppercase; color: var(--gray);
      transition: var(--tr); cursor: pointer;
    }

    .social-btn:hover { border-color: var(--orange); color: var(--orange); }
    .social-btn .social-icon { font-size: 18px; }

    .social-btn.facebook:hover { color: #1877F2; border-color: #1877F2; }
    .social-btn.instagram:hover { color: #E1306C; border-color: #E1306C; }
    .social-btn.linkedin:hover  { color: #0A66C2; border-color: #0A66C2; }
    .social-btn.youtube:hover   { color: #FF0000; border-color: #FF0000; }
    .social-btn.tiktok:hover    { color: #69C9D0; border-color: #69C9D0; }
    .social-btn.twitter:hover   { color: #1DA1F2; border-color: #1DA1F2; }

    /* Visit website btn */
    .website-btn {
      display: block; width: 100%; margin-top: 24px;
      background: var(--orange);
      text-align: center;
      font-family: var(--font-h); font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--white);
      padding: 14px;
      border-radius: 3px;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 100%, 10px 100%);
      transition: background var(--tr);
    }
    .website-btn:hover { background: var(--orange2); }

    /* ─── OTHER SPONSORS ────────────────────────────────────────────── */
    .other-sponsors {
      background: var(--dark2);
      padding: 80px 0;
    }

    .other-sponsors-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 40px; gap: 16px;
    }

    .other-sponsors-title {
      font-family: var(--font-h); font-size: 1.6rem; font-weight: 700;
      text-transform: uppercase;
    }
    .other-sponsors-title span { color: var(--orange); }

    .other-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .other-card {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 4px;
      padding: 24px 20px;
      text-align: center;
      transition: border-color var(--tr), transform var(--tr);
      cursor: pointer;
    }

    .other-card:hover { border-color: var(--orange); transform: translateY(-4px); }
    .other-card.current { border-color: var(--orange); opacity: .5; pointer-events: none; }

    .other-card-logo { font-size: 32px; margin-bottom: 10px; }

    .other-card-name {
      font-family: var(--font-h); font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--gray);
    }

    /* ─── FOOTER ─────────────────────────────────────────────────────── */
    .footer {
      background: var(--dark2);
      border-top: 1px solid rgba(255,255,255,.06);
      padding: 40px 0;
    }

    .footer-bottom {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }

    .footer-bottom p { font-size: 13px; color: var(--gray); }
    .footer-bottom span { color: var(--orange); }

    /* ─── NOT FOUND ─────────────────────────────────────────────────── */
    .not-found {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; text-align: center;
      padding: 24px;
    }

    .not-found h1 {
      font-family: var(--font-h); font-size: 3rem;
      text-transform: uppercase; color: var(--orange);
    }

    .not-found p { color: var(--gray); font-size: 15px; }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .sponsor-hero-inner { grid-template-columns: 1fr; gap: 32px; }
      .sponsor-logo-box { width: 200px; height: 140px; }
      .content-grid { grid-template-columns: 1fr; }
      .contact-card { position: static; }
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .perks-grid { grid-template-columns: 1fr; }
      .social-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .sponsor-logo-box { width: 100%; height: 130px; }
    }

    /* ─── FADE IN ────────────────────────────────────────────────────── */
    .fade-in { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
    .fade-in.visible { opacity: 1; transform: none; }
  </style>

    // ══════════════════════════════════════════════════════════════════
    //  SOCIAL MEDIA CONFIG
    // ══════════════════════════════════════════════════════════════════
    const SOCIAL_META = {
      facebook:  { label: "Facebook",  icon: "f",  cls: "facebook"  },
      instagram: { label: "Instagram", icon: "📷", cls: "instagram" },
      linkedin:  { label: "LinkedIn",  icon: "in", cls: "linkedin"  },
      youtube:   { label: "YouTube",   icon: "▶",  cls: "youtube"   },
      tiktok:    { label: "TikTok",    icon: "♪",  cls: "tiktok"    },
      twitter:   { label: "X/Twitter", icon: "𝕏",  cls: "twitter"   },
    };

    // ══════════════════════════════════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════════════════════════════════
    function render() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'), 10);
      const sponsor = SPONSORS.find(s => s.id === id);

      if (!sponsor) {
        document.getElementById('pageContent').innerHTML = `
          <div class="not-found">
            <h1>Nie znaleziono sponsora</h1>
            <p>Sprawdź czy adres URL jest poprawny.</p>
            <a href="index.html#sponsors" style="color:var(--orange);font-family:var(--font-h);letter-spacing:2px;text-transform:uppercase;margin-top:8px;">← Wróć do strony głównej</a>
          </div>`;
        return;
      }

      document.title = `${sponsor.name} — Ekipa Zimnego Lecha`;

      // Split name for highlight
      const nameParts = sponsor.name.split(sponsor.nameHighlight);
      const nameHTML = nameParts.length === 2
        ? `${nameParts[0]}<em>${sponsor.nameHighlight}</em>${nameParts[1]}`
        : sponsor.name;

      // Logo
      const logoHTML = sponsor.logo
        ? `<img src="${sponsor.logo}" alt="${sponsor.name} logo" />`
        : `<div class="sponsor-logo-placeholder"><span class="logo-icon">${sponsor.logoEmoji}</span>Logo sponsora</div>`;

      // Perks
      const perksHTML = sponsor.perks.map(p => `
        <div class="perk-item fade-in">
          <div class="perk-icon">${p.icon}</div>
          <div class="perk-title">${p.title}</div>
          <div class="perk-desc">${p.desc}</div>
        </div>`).join('');

      // Contact items
      const { email, phone, website, address } = sponsor.contact;
      const contactItemsHTML = [
        email   ? `<div class="contact-item"><div class="contact-icon">📧</div><div><div class="contact-item-label">E-mail</div><div class="contact-item-value"><a href="mailto:${email}">${email}</a></div></div></div>` : '',
        phone   ? `<div class="contact-item"><div class="contact-icon">📞</div><div><div class="contact-item-label">Telefon</div><div class="contact-item-value"><a href="tel:${phone.replace(/\s/g,'')}">${phone}</a></div></div></div>` : '',
        website ? `<div class="contact-item"><div class="contact-icon">🌐</div><div><div class="contact-item-label">Strona WWW</div><div class="contact-item-value"><a href="${website}" target="_blank" rel="noopener">${website.replace(/https?:\/\//,'')}</a></div></div></div>` : '',
        address ? `<div class="contact-item"><div class="contact-icon">📍</div><div><div class="contact-item-label">Adres</div><div class="contact-item-value">${address}</div></div></div>` : '',
      ].join('');

      // Social buttons — tylko te które mają URL
      const socialBtns = Object.entries(sponsor.social)
        .filter(([, url]) => url)
        .map(([key, url]) => {
          const m = SOCIAL_META[key] || { label: key, icon: '🔗', cls: '' };
          return `<a href="${url}" target="_blank" rel="noopener" class="social-btn ${m.cls}"><span class="social-icon">${m.icon}</span>${m.label}</a>`;
        }).join('');

      const hasSocial = socialBtns.length > 0;

      // Other sponsors
      const othersHTML = SPONSORS.map(s => `
        <a href="sponsor.html?id=${s.id}" class="other-card ${s.id === id ? 'current' : ''}">
          <div class="other-card-logo">${s.logoEmoji}</div>
          <div class="other-card-name">Sponsor ${s.id}</div>
        </a>`).join('');

      document.getElementById('pageContent').innerHTML = `
        <!-- HERO -->
        <section class="sponsor-hero">
          <div class="hero-shape"></div>
          <div class="container">
            <div class="sponsor-hero-inner fade-in">
              <div class="sponsor-logo-box">
                <div class="sponsor-tier">${sponsor.tier}</div>
                ${logoHTML}
              </div>
              <div>
                <div class="sponsor-breadcrumb">
                  <a href="index.html">Strona główna</a> ›
                  <a href="index.html#sponsors">Sponsorzy</a> ›
                  <span>${sponsor.name}</span>
                </div>
                <h1 class="sponsor-name">${nameHTML}</h1>
                <p class="sponsor-tagline">${sponsor.tagline}</p>
                <div class="sponsor-badges">
                  <span class="badge orange">${sponsor.tier}</span>
                  <span class="badge">Partner Ekipy Zimnego Lecha</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- CONTENT -->
        <section class="sponsor-content">
          <div class="container">
            <div class="content-grid">
              <!-- LEFT: opis + perks -->
              <div>
                <span class="section-label">O firmie</span>
                <h2 class="content-title">Kim <span>jesteśmy?</span></h2>
                <div class="content-desc fade-in">${sponsor.description}</div>

                <div class="perks-grid">
                  ${perksHTML}
                </div>
              </div>

              <!-- RIGHT: kontakt -->
              <div>
                <div class="contact-card fade-in">
                  <div class="contact-card-title">Dane kontaktowe</div>
                  ${contactItemsHTML}
                  ${hasSocial ? `<div class="social-title">Social media</div><div class="social-grid">${socialBtns}</div>` : ''}
                  ${sponsor.contact.website ? `<a href="${sponsor.contact.website}" target="_blank" rel="noopener" class="website-btn">Odwiedź stronę →</a>` : ''}
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- OTHER SPONSORS -->
        <section class="other-sponsors">
          <div class="container">
            <div class="other-sponsors-header fade-in">
              <h2 class="other-sponsors-title">Pozostali <span>Sponsorzy</span></h2>
              <a href="index.html#sponsors" style="font-family:var(--font-h);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);">← Wróć do slajdera</a>
            </div>
            <div class="other-grid fade-in">
              ${othersHTML}
            </div>
          </div>
        </section>
      `;

      // Trigger fade-in
      setTimeout(() => {
        document.querySelectorAll('.fade-in').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 60);
        });
      }, 50);
    }

    // ── HAMBURGER ─────────────────────────────────────────────────────
    document.getElementById('hamburger').addEventListener('click', function () {
      this.classList.toggle('open');
      document.getElementById('mobileMenu').classList.toggle('open');
    });

    // ── INIT ──────────────────────────────────────────────────────────
    render();
